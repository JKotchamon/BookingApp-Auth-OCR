services:
  web:
    build: .
    container_name: hbms_web
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html

  db:
    image: mysql:8.0
    container_name: hbms_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: StrongDBPassword@
      MYSQL_DATABASE: hbmsdb
    volumes:
      - ./hbmsdb.sql:/docker-entrypoint-initdb.d/00_hbmsdb.sql
      - ./migrations/V001__oauth_user_columns.sql:/docker-entrypoint-initdb.d/01_V001__oauth_user_columns.sql
      - ./migrations/V002__kyc_schema.sql:/docker-entrypoint-initdb.d/02_V002__kyc_schema.sql
      - ./migrations/V003__tighten_auth_method_enum.sql:/docker-entrypoint-initdb.d/03_V003__tighten_auth_method_enum.sql
      - ./migrations/V004__add_registration_name.sql:/docker-entrypoint-initdb.d/04_V004__add_registration_name.sql
      - ./migrations/V005__add_display_name.sql:/docker-entrypoint-initdb.d/05_V005__add_display_name.sql
      - ./migrations/V006__kyc_audit_signature.sql:/docker-entrypoint-initdb.d/06_V006__kyc_audit_signature.sql
      - ./migrations/V007__add_hybrid_encryption_columns.sql:/docker-entrypoint-initdb.d/07_V007__add_hybrid_encryption_columns.sql
      - ./migrations/V008__add_key_fingerprint.sql:/docker-entrypoint-initdb.d/08_V008__add_key_fingerprint.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pStrongDBPassword@"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hbms_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: StrongDBPassword@
    depends_on:
      - db

volumes:
  db_data:
